<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>archi 릴스 보드</title>
<style>
  :root{ --bg:#f3efe9; --card:#fff; --ink:#3a352f; --sub:#8b8378; --accent:#c56a4a; --line:#e6e0d7; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,"Apple SD Gothic Neo","Pretendard",sans-serif; background:var(--bg); color:var(--ink); }
  /* PIN 게이트 */
  #gate{ position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; z-index:10; }
  #gate h1{ font-size:20px; font-weight:700; letter-spacing:.5px; margin:0; color:var(--ink); }
  #gate p{ margin:0; color:var(--sub); font-size:13px; }
  .pin-dots{ display:flex; gap:12px; }
  .pin-dots span{ width:13px; height:13px; border-radius:50%; border:1.5px solid var(--sub); transition:.15s; }
  .pin-dots span.on{ background:var(--accent); border-color:var(--accent); }
  .pad{ display:grid; grid-template-columns:repeat(3,72px); gap:14px; margin-top:6px; }
  .pad button{ height:72px; border-radius:50%; border:none; background:var(--card); color:var(--ink); font-size:24px; font-weight:600; box-shadow:0 1px 4px rgba(0,0,0,.06); cursor:pointer; transition:.1s; }
  .pad button:active{ transform:scale(.94); background:#efe9e0; }
  .pad button.wide{ grid-column:span 1; font-size:15px; color:var(--sub); background:transparent; box-shadow:none; }
  #gate.err .pin-dots{ animation:shake .3s; }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  /* 대시보드 */
  header{ padding:20px 18px 10px; }
  header h2{ margin:0; font-size:20px; font-weight:800; }
  header .cnt{ color:var(--sub); font-size:13px; margin-top:3px; }
  .grid{ padding:8px 14px 60px; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px; }
  .card{ background:var(--card); border-radius:18px; overflow:hidden; box-shadow:0 2px 10px rgba(0,0,0,.06); display:flex; flex-direction:column; }
  .card .thumb{ width:100%; aspect-ratio:9/16; object-fit:cover; background:#000; display:block; cursor:pointer; }
  .card .thumb-link{ display:block; position:relative; }
  .card .thumb-link::after{ content:"▶"; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:46px; height:46px; line-height:46px; text-align:center; font-size:18px; color:#fff; background:rgba(0,0,0,.4); border-radius:50%; pointer-events:none; }
  .card .body{ padding:13px 14px 15px; display:flex; flex-direction:column; gap:9px; }
  .card .title{ font-weight:700; font-size:15px; }
  .card .meta{ font-size:12px; color:var(--sub); }
  .card .cap{ font-size:13px; line-height:1.5; white-space:pre-wrap; max-height:120px; overflow:auto; background:#faf7f2; border:1px solid var(--line); border-radius:10px; padding:10px; }
  .row{ display:flex; gap:8px; }
  .btn{ flex:1; border:none; border-radius:10px; padding:11px; font-size:13px; font-weight:600; cursor:pointer; }
  .btn.copy{ background:#efe9e0; color:var(--ink); }
  .btn.dl{ background:var(--ink); color:#fff; text-decoration:none; text-align:center; }
  .btn.done{ background:var(--accent); color:#fff; }
  .btn:active{ opacity:.8; }
  .empty{ text-align:center; color:var(--sub); padding:60px 20px; font-size:14px; }
  .toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:11px 18px; border-radius:20px; font-size:13px; opacity:0; transition:.25s; pointer-events:none; }
  .toast.show{ opacity:1; }
</style>
</head>
<body>
<div id="gate">
  <h1>🤍 archi 릴스 보드</h1>
  <p>PIN 6자리를 입력하세요</p>
  <div class="pin-dots" id="dots"><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <div class="pad" id="pad"></div>
</div>

<div id="app" hidden>
  <header>
    <h2>🤍 archi 릴스</h2>
    <div class="cnt" id="cnt"></div>
  </header>
  <div class="grid" id="grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const PIN_HASH = "4649a2421f81e43d6d2505d80b3185f81e475d315ad74c5776fb85e2e87236f3"; // SHA-256(PIN)
const AUTH_KEY = "archi_board_auth_v1";

async function sha256(s){ const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join(""); }
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1600); }

// ---- PIN 게이트 ----
let pin="";
function renderDots(){ document.querySelectorAll("#dots span").forEach((d,i)=>d.classList.toggle("on",i<pin.length)); }
function buildPad(){
  const pad=document.getElementById("pad");
  const keys=["1","2","3","4","5","6","7","8","9","","0","⌫"];
  keys.forEach(k=>{
    const b=document.createElement("button");
    if(k==="") { b.className="wide"; b.disabled=true; b.style.visibility="hidden"; }
    else if(k==="⌫"){ b.className="wide"; b.textContent="⌫"; b.onclick=()=>{ pin=pin.slice(0,-1); renderDots(); }; }
    else { b.textContent=k; b.onclick=()=>press(k); }
    pad.appendChild(b);
  });
}
async function press(k){
  if(pin.length>=6) return;
  pin+=k; renderDots();
  if(pin.length===6){
    const h=await sha256(pin);
    if(h===PIN_HASH){ sessionStorage.setItem(AUTH_KEY,"1"); enter(); }
    else{ const g=document.getElementById("gate"); g.classList.add("err"); setTimeout(()=>{g.classList.remove("err"); pin=""; renderDots();},350); }
  }
}
function enter(){ document.getElementById("gate").style.display="none"; document.getElementById("app").hidden=false; loadReels(); }

// ---- 대시보드 ----
async function loadReels(){
  let data=[];
  try{ data=await (await fetch("manifest.json?"+Date.now())).json(); }catch(e){ }
  const list=data;
  const grid=document.getElementById("grid");
  document.getElementById("cnt").textContent = list.length+"개 업로드 대기중";
  grid.innerHTML="";
  if(!list.length){ grid.innerHTML='<div class="empty">업로드할 릴스가 없습니다 🤍<br>새 릴스가 추가되면 여기에 나타납니다.</div>'; return; }
  list.forEach(r=>{
    const c=document.createElement("div"); c.className="card";
    c.innerHTML=`
      <a class="thumb-link" href="${r.video}" target="_blank" rel="noopener" title="클릭하면 영상 확인(새 탭)"><img class="thumb" src="posters/${r.id}.jpg" loading="lazy" alt="${(r.title||'릴스').replace(/"/g,'')}"></a>
      <div class="body">
        <div class="title">${r.title||"릴스"}</div>
        <div class="meta">${r.product||""} ${r.date?("· "+r.date):""}</div>
        <div class="links" style="font-size:12px;margin:6px 0;line-height:1.8;word-break:break-all;background:#faf7f2;padding:8px 10px;border-radius:8px">
          🔗 쿠팡 파트너스: ${r.coupang?`<a href="${r.coupang}" target="_blank" rel="noopener">${r.coupang}</a>`:"<b style='color:#c00'>미생성</b>"}<br>
          🏷️ 인포크: ${r.inpock?`<a href="${r.inpock}" target="_blank" rel="noopener">${r.inpock}</a>`:""} 에서 <b>&lt;${r.inpocknum||"?"}&gt;</b> 검색
        </div>
        <div class="cap">${(r.caption||"").replace(/</g,"&lt;")}</div>
        <div class="row">
          <button class="btn copy">캡션 복사</button>
          <a class="btn dl" href="${r.video}" download>영상 다운로드</a>${r.cover?`<a class="btn dl" href="${r.cover}" download style="background:#5a8f5a">커버</a>`:""}
        </div>
      </div>`;
    c.querySelector(".copy").onclick=()=>{ navigator.clipboard.writeText(r.caption||"").then(()=>toast("캡션 복사됨")); };
    grid.appendChild(c);
  });
}

// 시작
buildPad(); renderDots();
if(sessionStorage.getItem(AUTH_KEY)==="1") enter();
</script>
</body>
</html>
